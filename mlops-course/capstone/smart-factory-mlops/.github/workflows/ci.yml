name: CI

# 持續整合：每次 push / PR 跑 lint -> 單元/整合測試 -> 資料驗證。
# 教學重點：把「程式品質 + 資料契約」都當成 merge 前的守門。

on:
  push:
    branches: [main, master]
    paths:
      - "mlops-course/capstone/smart-factory-mlops/**"
  pull_request:
    paths:
      - "mlops-course/capstone/smart-factory-mlops/**"
  workflow_dispatch:

# 同一分支重複 push 時，取消前一次仍在跑的 CI，省資源。
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: mlops-course/capstone/smart-factory-mlops

env:
  PYTHONUNBUFFERED: "1"

jobs:
  lint:
    name: Lint and format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install lint tools
        run: pip install ruff==0.6.* black==24.*

      - name: Ruff (lint)
        run: ruff check .

      - name: Black (format check)
        run: black --check .

  test:
    name: Unit and integration tests
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install project (test extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" || pip install -r requirements.txt || true
          pip install pytest pytest-cov scikit-learn pandas numpy pyyaml

      - name: Run pytest with coverage
        run: |
          pytest -q \
            --cov=src --cov=pipelines \
            --cov-report=term-missing \
            --cov-report=xml \
            tests/unit tests/integration

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python-version }}
          path: mlops-course/capstone/smart-factory-mlops/coverage.xml
          if-no-files-found: ignore

  data-validation:
    name: Data contract validation
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: pip install pytest pandas numpy pyyaml

      - name: Validate data expectations
        run: pytest -q tests/data
